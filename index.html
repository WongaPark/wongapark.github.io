<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonga Park</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;           /* Fill the screen */
            background-position: center 35%;  /* Move focus toward the text (adjust % if needed) */
            background-color: #000;           /* Black fallback */
            font-family: Impact, Arial Black, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .content {
            max-width: 95%;
            padding: 20px;
        }

        h1 {
            font-size: 7rem;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: 10px;
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.95);
            text-transform: uppercase;
        }

        /* Mobile friendly */
        @media (max-width: 768px) {
            h1 {
                font-size: 3.8rem;
                letter-spacing: 5px;
            }
