<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonga Park</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: contain;     /* Changed from cover to contain */
            background-color: black;      /* Black background for the edges */
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            max-width: 90%;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
            letter-spacing: 12px;
            line-height: 1.05;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.8rem;
                letter-spacing: 6px;
            }
